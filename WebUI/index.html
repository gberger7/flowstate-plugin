                input.focus();
                input.select();
                
                input.dataset.currentParam = paramId;
                
                // Remove any existing listeners to prevent duplicates
                const newInput = input.cloneNode(true);
                input.parentNode.replaceChild(newInput, input);

                // Re-apply styles after clone
                newInput.style.width   = inputW + 'px';
                newInput.style.display = 'block';
                newInput.style.left    = left + 'px';
                newInput.style.top     = top  + 'px';
                newInput.value = currentValue.toFixed(2);
                newInput.dataset.currentParam = paramId;
                newInput.focus();
                newInput.select();
                
                const onSubmit = () => {
                    const newValue = parseFloat(newInput.value);
                    const targetParamId = newInput.dataset.currentParam;
                    if (!isNaN(newValue) && targetParamId) {
                        const normalized = this.valueToNormalized(targetParamId, newValue);
                        this.updateParam(targetParamId, Math.max(0, Math.min(1, normalized)), true);
                    }
                    newInput.style.display = 'none';
                };
                
                newInput.addEventListener('blur', () => newInput.style.display = 'none', { once: true });
                newInput.addEventListener('keydown', (event) => {
                    if (event.key === 'Escape') newInput.style.display = 'none';
                    else if (event.key === 'Enter') onSubmit();
                });
            },
            
            // Update BPM display (called from C++)
            updateBPMDisplay(bpm, division) {
                this.currentBPM = bpm;
                const bpmDisplay = document.querySelector('[data-bpm-display="delayTime"]');
                
                if (bpmDisplay) {
                    const divisionNames = [
                        '1/32', '1/32D', '1/32T',
                        '1/16', '1/16D', '1/16T',
                        '1/8', '1/8D', '1/8T',
                        '1/4', '1/4D', '1/4T',
                        '1/2', '1/2D', '1/2T',
                        '1/1', '1/1D', '1/1T'
                    ];
                    
                    const divisionName = divisionNames[division] || '1/4';
                    bpmDisplay.textContent = divisionName;
                    bpmDisplay.classList.add('visible');
                }
            },
            
            // Hide BPM display when sync is off
            hideBPMDisplay() {
                const bpmDisplay = document.querySelector('[data-bpm-display="delayTime"]');
                if (bpmDisplay) {
                    bpmDisplay.classList.remove('visible');
                }
            }
        };
        
        // Initialize flowstate on DOM ready
        window.addEventListener('DOMContentLoaded', () => {
            window.flowstate.init();
        });

        // Particle system — runs immediately, no DOMContentLoaded wrapper needed
        // because this script is at the bottom of <body> and the canvas already exists
        (function startParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            const W = 900, H = 620;
            const COUNT = 70;

            const COLORS = [
                { r: 62,  g: 207, b: 207 },  // teal
                { r: 232, g: 168, b: 56  },  // amber
                { r: 255, g: 255, b: 255 },  // white
            ];

            function randomColor() {
                const c = COLORS[Math.floor(Math.random() * COLORS.length)];
                const isWhite = c.r === 255 && c.g === 255;
                const alpha = isWhite
                    ? 0.2 + Math.random() * 0.1
                    : 0.4 + Math.random() * 0.2;
                return { ...c, baseAlpha: alpha };
            }

            function makeParticle(x) {
                const col = randomColor();
                return {
                    x: x !== undefined ? x : Math.random() * W,
                    y: Math.random() * H,
                    r: 0.8 + Math.random() * 2.2,
                    speed: 0.2 + Math.random() * 0.6,
                    col,
                };
            }

            const particles = Array.from({ length: COUNT }, () => makeParticle());

            function draw() {
                console.log('particles running');
                ctx.clearRect(0, 0, W, H);

                for (const p of particles) {
                    let alpha = p.col.baseAlpha;
                    if (p.x < 60)      alpha *= p.x / 60;
                    if (p.x > W - 60)  alpha *= (W - p.x) / 60;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.col.r},${p.col.g},${p.col.b},${alpha})`;
                    ctx.fill();

                    p.x -= p.speed;

                    if (p.x < -p.r) {
                        const reset = makeParticle(W + p.r);
                        p.x = reset.x;
                        p.y = reset.y;
                        p.r = reset.r;
                        p.speed = reset.speed;
                        p.col = reset.col;
                    }
                }

                requestAnimationFrame(draw);
            }

            draw();
        })();
    </script>
